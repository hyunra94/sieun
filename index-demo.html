<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파일 업로드 (데모)</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📁</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f3ef;
      --surface: #ffffff;
      --border: #e8ddd4;
      --pink: #f2a7b8;
      --pink-light: #fce8ed;
      --pink-deep: #e07f96;
      --green: #a8c5a0;
      --green-light: #e8f5e5;
      --text: #3a2e2e;
      --text-sub: #8a7070;
      --shadow: 0 4px 20px rgba(180,130,130,0.12);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(circle at 20% 20%, #fce8ed55 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #e8f5e555 0%, transparent 50%);
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1.5px solid var(--border);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--pink-light) 0%, var(--green-light) 100%);
      padding: 24px 32px 16px;
      border-bottom: 1.5px solid var(--border);
    }
    .card-header h1 { font-size: 20px; font-weight: 700; color: var(--text); }
    .card-header p { font-size: 12px; color: var(--text-sub); margin-top: 3px; }

    .demo-banner {
      background: #fff8e1;
      border-bottom: 1.5px solid #ffe082;
      padding: 10px 32px;
      font-size: 12px;
      color: #8a6a00;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .key-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-bottom: 1.5px solid var(--border);
      background: #fdfbf9;
    }
    .key-bar label { font-size: 13px; font-weight: 500; color: var(--text-sub); white-space: nowrap; }
    .key-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .key-bar input:focus { border-color: var(--pink); }
    .key-hint { font-size: 11px; color: var(--pink-deep); white-space: nowrap; }

    .card-body { padding: 24px 32px; display: flex; flex-direction: column; gap: 18px; }

    .dropzone {
      border: 2px dashed var(--pink);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
      position: relative;
    }
    .dropzone:hover, .dropzone.drag-over { background: var(--pink-light); border-color: var(--pink-deep); }
    .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .dropzone-icon { font-size: 32px; margin-bottom: 8px; }
    .dropzone p { font-size: 14px; font-weight: 500; color: var(--text); }
    .dropzone span { font-size: 12px; color: var(--text-sub); margin-top: 4px; display: block; }

    .file-list { display: flex; flex-direction: column; gap: 7px; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      background: var(--pink-light); border-radius: 9px; padding: 9px 12px; font-size: 13px;
    }
    .file-item .file-name { flex: 1; color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item .file-size { color: var(--text-sub); font-size: 12px; flex-shrink: 0; }
    .file-item .remove-btn { background: none; border: none; cursor: pointer; color: var(--pink-deep); font-size: 15px; padding: 0; flex-shrink: 0; line-height: 1; }

    .progress-wrap { display: none; }
    .progress-wrap.show { display: block; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sub); margin-bottom: 6px; }
    .progress-bar-bg { background: var(--border); border-radius: 100px; height: 8px; overflow: hidden; }
    .progress-bar-fill { background: linear-gradient(90deg, var(--pink), var(--green)); height: 100%; border-radius: 100px; width: 0%; transition: width 0.3s ease; }

    .upload-btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--green) 100%);
      border: none; border-radius: 12px; color: #fff;
      font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .upload-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .upload-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .result-box { display: none; flex-direction: column; gap: 8px; }
    .result-box.show { display: flex; }

    .error-box { display: none; background: #fff0f0; border: 1.5px solid #f5b8b8; border-radius: 10px; padding: 11px 14px; font-size: 13px; color: #c0392b; }
    .error-box.show { display: block; }

    .fcard { background: var(--green-light); border: 1.5px solid var(--green); border-radius: 10px; padding: 11px 14px; }
    .fcard-name { font-size: 12px; color: var(--text-sub); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
    .fcard-meta { margin-left: auto; font-size: 11px; color: var(--text-sub); }
    .fcard-row { display: flex; align-items: center; gap: 6px; }
    .fcard-url-hidden { display: none; }
    .btn-group { display: flex; gap: 6px; width: 100%; }
    .copy-btn, .share-btn, .open-btn {
      border: none; border-radius: 7px; color: #fff;
      font-size: 11px; font-family: 'Noto Sans KR', sans-serif;
      padding: 7px 8px; cursor: pointer; white-space: nowrap;
      transition: background 0.2s; flex: 1; text-align: center;
    }
    .copy-btn { background: var(--pink); }
    .copy-btn:hover { background: var(--pink-deep); }
    .copy-btn.copied { background: var(--green); }
    .share-btn { background: var(--green); }
    .share-btn:hover { background: #7aaa72; }
    .open-btn { background: #a0b4e0; }
    .open-btn:hover { background: #7a96cc; }

    .expire-note { text-align: center; font-size: 11px; color: var(--text-sub); }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>파일 업로드</h1>
    <p>비밀키 입력 후 파일을 업로드하세요 · 7일 후 자동 삭제</p>
  </div>

  <div class="demo-banner">
    🧪 데모 버전입니다 · 비밀키 <strong style="margin:0 3px">test</strong> 를 입력해보세요
  </div>

  <div class="key-bar">
    <label>🔑 비밀키</label>
    <input type="password" id="secretKey" placeholder="비밀키를 입력하세요" />
    <span class="key-hint">힌트: test</span>
  </div>

  <div class="card-body">
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" multiple />
      <div class="dropzone-icon">📂</div>
      <p>파일을 드래그하거나 클릭해서 선택</p>
      <span>최대 100MB · 여러 파일 동시 업로드 가능</span>
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressText">업로드 중...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="error-box" id="errorBox"></div>
    <div class="result-box" id="resultBox"></div>
    <button class="upload-btn" id="uploadBtn" disabled>업로드</button>
    <p class="expire-note">🗓 실제 서비스에서는 7일 후 자동으로 삭제됩니다</p>
  </div>
</div>

<script>
  const DEMO_KEY = 'test';
  const secretKeyInput = document.getElementById('secretKey');
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileListEl = document.getElementById('fileList');
  const uploadBtn = document.getElementById('uploadBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const progressPct = document.getElementById('progressPct');
  const resultBox = document.getElementById('resultBox');
  const errorBox = document.getElementById('errorBox');
  let selectedFiles = [];

  function formatSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
    if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + 'MB';
    return (bytes / 1024 / 1024 / 1024).toFixed(2) + 'GB';
  }

  function makeFcard({ name, url, size }) {
    const card = document.createElement('div');
    card.className = 'fcard';
    const nameRow = document.createElement('div');
    nameRow.className = 'fcard-name';
    nameRow.innerHTML = `<span>📄 ${name}</span>`;
    if (size) {
      const meta = document.createElement('span');
      meta.className = 'fcard-meta';
      meta.textContent = formatSize(size);
      nameRow.appendChild(meta);
    }
    const row = document.createElement('div');
    row.className = 'fcard-row';
    const linkEl = document.createElement('div');
    linkEl.className = 'fcard-url-hidden';
    linkEl.textContent = url;

    const openBtn = document.createElement('button');
    openBtn.className = 'open-btn';
    openBtn.textContent = '🔗 바로가기';
    openBtn.addEventListener('click', () => window.open(url, '_blank'));

    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = '📋 링크복사';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(url).then(() => {
        copyBtn.textContent = '✅ 복사됨!';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = '📋 링크복사'; copyBtn.classList.remove('copied'); }, 2000);
      });
    });

    const btnGroup = document.createElement('div');
    btnGroup.className = 'btn-group';
    btnGroup.appendChild(openBtn);
    btnGroup.appendChild(copyBtn);

    if (navigator.share) {
      const shareBtn = document.createElement('button');
      shareBtn.className = 'share-btn';
      shareBtn.textContent = '📤 공유';
      shareBtn.addEventListener('click', () => {
        navigator.share({ title: name, text: `📁 ${name}`, url }).catch(() => {});
      });
      btnGroup.appendChild(shareBtn);
    }

    row.appendChild(linkEl);
    row.appendChild(btnGroup);
    card.appendChild(nameRow);
    card.appendChild(row);
    return card;
  }

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); addFiles([...e.dataTransfer.files]); });
  fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

  function addFiles(files) {
    files.forEach(f => { if (!selectedFiles.find(x => x.name === f.name && x.size === f.size)) selectedFiles.push(f); });
    renderFileList();
  }

  function renderFileList() {
    fileListEl.innerHTML = '';
    selectedFiles.forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = `<span>📄</span><span class="file-name">${f.name}</span><span class="file-size">${formatSize(f.size)}</span><button class="remove-btn" data-i="${i}">✕</button>`;
      fileListEl.appendChild(item);
    });
    fileListEl.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => { selectedFiles.splice(Number(btn.dataset.i), 1); renderFileList(); });
    });
    uploadBtn.disabled = selectedFiles.length === 0;
  }

  function showError(msg) { errorBox.textContent = '⚠️ ' + msg; errorBox.classList.add('show'); }
  function hideError() { errorBox.classList.remove('show'); }
  function setProgress(pct) { progressFill.style.width = pct + '%'; progressPct.textContent = pct + '%'; }

  uploadBtn.addEventListener('click', async () => {
    const secret = secretKeyInput.value.trim();
    if (!secret) { showError('비밀키를 입력해주세요.'); return; }
    if (secret !== DEMO_KEY) { showError('데모 버전입니다. 비밀키 "test"를 입력해주세요.'); return; }
    if (!selectedFiles.length) { showError('파일을 선택해주세요.'); return; }

    hideError();
    resultBox.innerHTML = '';
    resultBox.classList.remove('show');
    progressWrap.classList.add('show');
    uploadBtn.disabled = true;

    const results = [];
    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      progressText.textContent = `(${i + 1}/${selectedFiles.length}) ${file.name} 업로드 중...`;
      setProgress(0);
      await new Promise(r => setTimeout(r, 300));
      for (let p = 10; p <= 100; p += 10) {
        setProgress(p);
        await new Promise(r => setTimeout(r, 120));
      }
      const today = new Date().toISOString().slice(0, 10);
      results.push({
        name: file.name,
        url: `https://example.r2.dev/uploads/${today}/${encodeURIComponent(file.name)}`,
        size: file.size,
      });
    }

    progressText.textContent = '✅ 업로드 완료! (데모)';
    setProgress(100);
    results.forEach(r => resultBox.appendChild(makeFcard(r)));
    resultBox.classList.add('show');
    selectedFiles = [];
    renderFileList();
    setTimeout(() => progressWrap.classList.remove('show'), 1500);
  });
</script>

</body>
</html>
