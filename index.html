<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파일 업로드</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📁</text></svg>" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#7db8f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="파일업로드" />
  <meta property="og:title" content="파일 업로드" />
  <meta property="og:image" content="https://hyunra94.github.io/assets/og-default.png" />
  <meta property="og:url" content="https://hyunraupload.pages.dev/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f6ff;
      --surface: #ffffff;
      --border: #c8dff8;
      --pink: #7db8f7;
      --pink-light: #e3f0ff;
      --pink-deep: #4a90d9;
      --green: #82c4e8;
      --green-light: #dff1fb;
      --text: #1a3a5c;
      --text-sub: #6a90b8;
      --shadow: 0 4px 20px rgba(100,160,220,0.13);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(circle at 20% 20%, #daeeff55 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #e3f0ff55 0%, transparent 50%);
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1.5px solid var(--border);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--pink-light) 0%, var(--green-light) 100%);
      padding: 24px 32px 16px;
      border-bottom: 1.5px solid var(--border);
    }
    .card-header h1 { font-size: 20px; font-weight: 700; color: var(--text); }
    .card-header p { font-size: 12px; color: var(--text-sub); margin-top: 3px; }

    /* 공유로 열림 알림 */
    .share-notice {
      display: none;
      background: #e8f5e5;
      border-bottom: 1.5px solid var(--green);
      padding: 10px 32px;
      font-size: 12px;
      color: #3a6a3a;
      align-items: center;
      gap: 6px;
    }
    .share-notice.show { display: flex; }

    .key-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-bottom: 1.5px solid var(--border);
      background: #fdfbf9;
    }
    .key-bar label { font-size: 13px; font-weight: 500; color: var(--text-sub); white-space: nowrap; }
    .key-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .key-bar input:focus { border-color: var(--pink); }

    .tabs { display: flex; border-bottom: 1.5px solid var(--border); }
    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-sub);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: var(--pink-deep);
      border-bottom-color: var(--pink-deep);
      background: var(--pink-light);
    }

    .tab-panel { display: none; padding: 24px 32px; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 18px; }

    .dropzone {
      border: 2px dashed var(--pink);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
      position: relative;
    }
    .dropzone:hover, .dropzone.drag-over { background: var(--pink-light); border-color: var(--pink-deep); }
    .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .dropzone-icon { font-size: 32px; margin-bottom: 8px; }
    .dropzone p { font-size: 14px; font-weight: 500; color: var(--text); }
    .dropzone span { font-size: 12px; color: var(--text-sub); margin-top: 4px; display: block; }

    .file-list { display: flex; flex-direction: column; gap: 7px; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      background: var(--pink-light); border-radius: 9px; padding: 9px 12px; font-size: 13px;
    }
    .file-item .file-name { flex: 1; color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item .file-size { color: var(--text-sub); font-size: 12px; flex-shrink: 0; }
    .file-item .remove-btn { background: none; border: none; cursor: pointer; color: var(--pink-deep); font-size: 15px; padding: 0; flex-shrink: 0; line-height: 1; }

    .progress-wrap { display: none; }
    .progress-wrap.show { display: block; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sub); margin-bottom: 6px; }
    .progress-bar-bg { background: var(--border); border-radius: 100px; height: 8px; overflow: hidden; }
    .progress-bar-fill { background: linear-gradient(90deg, var(--pink), var(--green)); height: 100%; border-radius: 100px; width: 0%; transition: width 0.3s ease; }

    .upload-btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--green) 100%);
      border: none; border-radius: 12px; color: #fff;
      font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .upload-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .upload-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .result-box { display: none; flex-direction: column; gap: 8px; }
    .result-box.show { display: flex; }

    .error-box { display: none; background: #fff0f0; border: 1.5px solid #f5b8b8; border-radius: 10px; padding: 11px 14px; font-size: 13px; color: #c0392b; }
    .error-box.show { display: block; }

    .fcard { background: var(--green-light); border: 1.5px solid var(--green); border-radius: 10px; padding: 11px 14px; }
    .fcard-name {
      font-size: 12px; color: var(--text-sub); margin-bottom: 5px;
      display: flex; align-items: center; gap: 5px;
    }
    .fcard-name span:first-child {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .fcard-meta { margin-left: auto; font-size: 11px; color: var(--text-sub); }
    .fcard-row { display: flex; align-items: center; gap: 6px; }
    .fcard-url-hidden { display: none; }
    .btn-group { display: flex; gap: 6px; flex-shrink: 0; width: 100%; }
    .copy-btn, .share-btn, .open-btn { border: none; border-radius: 7px; color: #fff; font-size: 11px; font-family: 'Noto Sans KR', sans-serif; padding: 7px 8px; cursor: pointer; white-space: nowrap; transition: background 0.2s; flex: 1; text-align: center; }
    .copy-btn { background: var(--pink); }
    .copy-btn:hover { background: var(--pink-deep); }
    .copy-btn.copied { background: var(--green); }
    .share-btn { background: var(--green); }
    .share-btn:hover { background: #7aaa72; }
    .open-btn { background: #a0b4e0; }
    .open-btn:hover { background: #7a96cc; }
    .download-btn { background: var(--pink); }
    .download-btn:hover { background: var(--pink-deep); }
    .delete-btn { background: none; border: 1.5px solid #f5b8b8; border-radius: 7px; color: #c0392b; font-size: 11px; font-family: 'Noto Sans KR', sans-serif; padding: 5px 8px; cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; }
    .delete-btn:hover { background: #fff0f0; }

    .list-header { display: flex; align-items: center; justify-content: space-between; }
    .list-header span { font-size: 13px; color: var(--text-sub); }
    .refresh-btn { background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; color: var(--text-sub); cursor: pointer; transition: all 0.2s; }
    .refresh-btn:hover { border-color: var(--pink); color: var(--pink-deep); }
    .list-loading, .list-empty { text-align: center; padding: 32px; color: var(--text-sub); font-size: 13px; }
    .list-items { display: flex; flex-direction: column; gap: 8px; }
    .date-divider { font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; padding: 4px 0 2px; border-bottom: 1px solid var(--border); }
    .expire-note { text-align: center; font-size: 11px; color: var(--text-sub); }

    /* 단축 링크 */
    .shortlink-wrap {
      background: var(--pink-light);
      border: 1.5px solid var(--pink);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .shortlink-label { font-size: 12px; color: var(--text-sub); white-space: nowrap; }
    .shortlink-url {
      flex: 1;
      font-size: 13px;
      font-weight: 700;
      color: var(--pink-deep);
      filter: blur(5px);
      cursor: pointer;
      user-select: none;
      transition: filter 0.3s;
      text-decoration: none;
    }
    .shortlink-url.revealed {
      filter: none;
      cursor: pointer;
    }
    .shortlink-hint { font-size: 11px; color: var(--text-sub); white-space: nowrap; }

    /* 파일/텍스트 토글 */
    .mode-toggle {
      display: flex;
      gap: 6px;
      background: var(--pink-light);
      border-radius: 10px;
      padding: 4px;
    }
    .mode-btn {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      background: none;
      color: var(--text-sub);
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: #fff;
      color: var(--pink-deep);
      box-shadow: 0 1px 4px rgba(180,130,130,0.15);
    }

    /* 텍스트 입력 */
    .text-input-wrap { display: none; flex-direction: column; gap: 10px; }
    .text-input-wrap.show { display: flex; }
    .text-area {
      width: 100%;
      min-height: 160px;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      background: #fff;
      outline: none;
      resize: vertical;
      transition: border-color 0.2s;
      line-height: 1.6;
    }
    .text-area:focus { border-color: var(--pink); }
  </style>
</head>
<body>

<div class="card">

  <div class="card-header">
    <h1>📁 파일 업로드</h1>
    <p>비밀키 입력 후 파일을 올리거나 목록을 확인하세요 · 7일 후 자동 삭제</p>
  </div>

  <!-- 공유로 열림 알림 -->
  <div class="share-notice" id="shareNotice">
    📤 갤러리에서 공유된 파일이 자동으로 추가됐어요!
  </div>

  <div class="key-bar">
    <label>🔑 비밀키</label>
    <input type="password" id="secretKey" placeholder="비밀키를 입력하세요" />
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="upload">⬆️ 업로드</button>
    <button class="tab-btn" data-tab="list">📋 내 파일 목록</button>
  </div>

  <div class="tab-panel active" id="tab-upload">

    <!-- 파일/텍스트 토글 -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeFile" onclick="setMode('file')">📁 파일</button>
      <button class="mode-btn" id="modeText" onclick="setMode('text')">📝 텍스트</button>
    </div>

    <!-- 파일 업로드 영역 -->
    <div id="fileMode">
      <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" multiple />
      <div class="dropzone-icon">📂</div>
      <p>파일을 드래그하거나 클릭해서 선택</p>
      <span>최대 5GB · 여러 파일 동시 업로드 · Ctrl+V 붙여넣기 가능</span>
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressText">업로드 중...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="error-box" id="errorBox"></div>
    <div class="result-box" id="resultBox"></div>
    <button class="upload-btn" id="uploadBtn" disabled>업로드</button>
    </div><!-- end fileMode -->

    <!-- 텍스트 입력 영역 -->
    <div class="text-input-wrap" id="textMode">
      <textarea class="text-area" id="textInput" placeholder="전달할 내용을 붙여넣거나 입력하세요...&#10;코드, 긴 문장, 메모 등 무엇이든 가능해요!"></textarea>
      <div class="error-box" id="textErrorBox"></div>
      <div class="result-box" id="textResultBox"></div>
      <button class="upload-btn" id="textSendBtn">전송</button>
    </div>

    <p class="expire-note">🗓 업로드된 파일은 7일 후 자동으로 삭제됩니다</p>
  </div>

  <div class="tab-panel" id="tab-list">
    <div class="list-header">
      <span id="listCount">R2에 저장된 파일 목록</span>
      <button class="refresh-btn" id="refreshBtn">🔄 새로고침</button>
    </div>
    <div class="error-box" id="listErrorBox"></div>
    <div id="listContent">
      <div class="list-empty">비밀키를 입력하고 새로고침을 눌러주세요 🔑</div>
    </div>
    <p class="expire-note">🗓 업로드된 파일은 7일 후 자동으로 삭제됩니다</p>
  </div>

</div>

<script>
  const WORKER_URL = 'https://여기에-가족용-worker-주소.workers.dev';

  const secretKeyInput = document.getElementById('secretKey');
  const getSecret = () => secretKeyInput.value.trim();

  // ── 비밀키 저장/불러오기
  const SAVED_KEY = 'upload_secret';
  const saved = localStorage.getItem(SAVED_KEY);
  if (saved) secretKeyInput.value = saved;
  secretKeyInput.addEventListener('change', () => {
    if (secretKeyInput.value.trim()) localStorage.setItem(SAVED_KEY, secretKeyInput.value.trim());
  });

  // ── 단축 링크 모자이크 해제
  function revealLink() {
    document.getElementById('shortlink').classList.add('revealed');
    document.getElementById('shortlinkHint').style.display = 'none';
  }

  // ── 파일/텍스트 모드 토글
  function setMode(mode) {
    const fileMode = document.getElementById('fileMode');
    const textMode = document.getElementById('textMode');
    document.getElementById('modeFile').classList.toggle('active', mode === 'file');
    document.getElementById('modeText').classList.toggle('active', mode === 'text');
    fileMode.style.display = mode === 'file' ? 'flex' : 'none';
    fileMode.style.flexDirection = 'column';
    fileMode.style.gap = '18px';
    textMode.classList.toggle('show', mode === 'text');
  }

  // ── 텍스트 전송
  document.getElementById('textSendBtn').addEventListener('click', async () => {
    const secret = getSecret();
    const text = document.getElementById('textInput').value.trim();
    const textError = document.getElementById('textErrorBox');
    const textResult = document.getElementById('textResultBox');

    if (!secret) { textError.textContent = '⚠️ 비밀키를 입력해주세요.'; textError.classList.add('show'); return; }
    if (!text) { textError.textContent = '⚠️ 내용을 입력해주세요.'; textError.classList.add('show'); return; }

    textError.classList.remove('show');
    textResult.innerHTML = '';
    textResult.classList.remove('show');

    const sendBtn = document.getElementById('textSendBtn');
    sendBtn.disabled = true;
    sendBtn.textContent = '전송 중...';

    try {
      const now = new Date();
      const date = now.toISOString().slice(0, 10);
      const time = now.toTimeString().slice(0, 8).replace(/:/g, '-');
      const filename = `text_${date}_${time}.txt`;
      const BOM = '\uFEFF';
      const blob = new Blob([BOM + text], { type: 'text/plain; charset=utf-8' });
      const file = new File([blob], filename, { type: 'text/plain' });

      const formData = new FormData();
      formData.append('file', file);

      const res = await fetch(`${WORKER_URL}/upload-file`, {
        method: 'POST',
        headers: { 'X-Secret-Key': secret },
        body: formData,
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: '전송 실패' }));
        throw new Error(err.error);
      }

      const { downloadUrl, key } = await res.json();
      textResult.appendChild(makeFcard({ name: filename, url: downloadUrl, size: blob.size, key }));
      textResult.classList.add('show');
      document.getElementById('textInput').value = '';
    } catch (e) {
      textError.textContent = '⚠️ ' + e.message;
      textError.classList.add('show');
    }

    sendBtn.disabled = false;
    sendBtn.textContent = '전송';
  });

  // ── 서비스워커 등록
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(console.error);
  }

  // ── 공유로 열린 경우 파일 복원
  async function loadSharedFiles() {
    const params = new URLSearchParams(location.search);
    if (!params.has('shared')) return;

    // URL 파라미터 제거
    history.replaceState({}, '', '/');

    try {
      const cache = await caches.open('share-target-v1');
      const res = await cache.match('/shared-files');
      if (!res) return;

      const fileDataList = await res.json();
      await cache.delete('/shared-files');

      const files = fileDataList.map(f => {
        const uint8 = new Uint8Array(f.data);
        const blob = new Blob([uint8], { type: f.type });
        return new File([blob], f.name, { type: f.type });
      });

      addFiles(files);
      document.getElementById('shareNotice').classList.add('show');
      setTimeout(() => document.getElementById('shareNotice').classList.remove('show'), 4000);
    } catch (e) {
      console.error('공유 파일 복원 실패:', e);
    }
  }

  // ── 탭 전환
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'list') loadList();
    });
  });

  // ── 공통 유틸
  function formatSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
    if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + 'MB';
    return (bytes / 1024 / 1024 / 1024).toFixed(2) + 'GB';
  }

  function makeFcard({ name, url, size, key }) {
    const card = document.createElement('div');
    card.className = 'fcard';
    const nameRow = document.createElement('div');
    nameRow.className = 'fcard-name';
    nameRow.innerHTML = `<span>📄 ${name}</span>`;
    if (size) {
      const meta = document.createElement('span');
      meta.className = 'fcard-meta';
      meta.textContent = formatSize(size);
      nameRow.appendChild(meta);
    }
    const row = document.createElement('div');
    row.className = 'fcard-row';

    // URL은 숨기고 버튼만 표시
    const linkEl = document.createElement('div');
    linkEl.className = 'fcard-url-hidden';
    linkEl.textContent = url;

    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.style.flex = '1';
    copyBtn.textContent = '📋 링크복사';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(url).then(() => {
        copyBtn.textContent = '✅ 복사됨!';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = '📋 링크복사'; copyBtn.classList.remove('copied'); }, 2000);
      });
    });

    const btnGroup = document.createElement('div');
    btnGroup.className = 'btn-group';

    // 미리보기 버튼
    const openBtn = document.createElement('button');
    openBtn.className = 'open-btn';
    openBtn.textContent = '🖼️ 미리보기';

    // txt 파일 내용 펼치기 영역
    let textPreview = null;
    let isExpanded = false;

    openBtn.addEventListener('click', async () => {
      const ext = name.split('.').pop().toLowerCase();
      const isText = ext === 'txt';
      const isImage = ['jpg','jpeg','png','gif','webp','svg'].includes(ext);
      const isPdf = ext === 'pdf';

      if (!isText && !isImage && !isPdf) {
        window.open(url, '_blank');
        return;
      }

      // 미리보기 토글
      if (!textPreview) {
        textPreview = document.createElement('div');
        textPreview.style.cssText = `
          border:1.5px solid var(--border); border-radius:10px;
          overflow:hidden; margin-top:8px; display:none; position:relative;
        `;
        card.appendChild(textPreview);
      }

      isExpanded = !isExpanded;
      textPreview.style.display = isExpanded ? 'block' : 'none';
      openBtn.textContent = isExpanded ? '🔼 접기' : '🖼️ 미리보기';

      if (isExpanded && textPreview.innerHTML === '') {
        textPreview.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--text-sub)">⏳ 불러오는 중...</div>';
        try {
          if (isImage) {
            textPreview.innerHTML = `<img src="${url}" style="width:100%;display:block;border-radius:8px;" />`;
          } else if (isPdf) {
            textPreview.innerHTML = `<iframe src="${url}" style="width:100%;height:400px;border:none;"></iframe>`;
          } else if (isText) {
            const res = await fetch(`${WORKER_URL}/download?key=${encodeURIComponent(key)}`, {
              headers: { 'X-Secret-Key': getSecret() }
            });
            const text = await res.text();
            const pre = document.createElement('pre');
            pre.style.cssText = `
              background:#fff; padding:12px; font-size:12px;
              color:var(--text); white-space:pre-wrap; word-break:break-all;
              line-height:1.7; max-height:200px; overflow-y:auto; margin:0;
            `;
            pre.textContent = text;
            const copyBtn2 = document.createElement('button');
            copyBtn2.style.cssText = `
              position:absolute; top:8px; right:8px;
              background:var(--pink); border:none; border-radius:6px;
              color:#fff; font-size:11px; font-family:'Noto Sans KR',sans-serif;
              padding:4px 8px; cursor:pointer;
            `;
            copyBtn2.textContent = '복사';
            copyBtn2.addEventListener('click', () => {
              navigator.clipboard.writeText(text).then(() => {
                copyBtn2.textContent = '✅';
                setTimeout(() => { copyBtn2.textContent = '복사'; }, 2000);
              });
            });
            textPreview.innerHTML = '';
            textPreview.appendChild(pre);
            textPreview.appendChild(copyBtn2);
          }
        } catch(e) {
          textPreview.innerHTML = `<div style="padding:12px;font-size:12px;color:#c0392b">불러오기 실패: ${e.message}</div>`;
        }
      }
    });
    btnGroup.appendChild(openBtn);

    // 다운로드 버튼
    const dlBtn = document.createElement('button');
    dlBtn.className = 'copy-btn';
    dlBtn.textContent = '⬇️ 다운로드';
    dlBtn.addEventListener('click', async () => {
      dlBtn.textContent = '⏳ 준비 중...';
      try {
        const res = await fetch(`${WORKER_URL}/download?key=${encodeURIComponent(key)}`, {
          headers: { 'X-Secret-Key': getSecret() }
        });
        if (!res.ok) throw new Error('다운로드 실패');
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
      } catch(e) {
        alert('다운로드 실패: ' + e.message);
      }
      dlBtn.textContent = '⬇️ 다운로드';
    });
    btnGroup.appendChild(dlBtn);

    // 공유·복사 버튼 (공유 API 지원 시 공유 시트, 미지원 시 링크복사)
    const shareBtn = document.createElement('button');
    shareBtn.className = 'share-btn';
    shareBtn.textContent = '📤 공유·복사';
    shareBtn.addEventListener('click', async () => {
      const isTxt = name.endsWith('.txt');

      // txt 파일이면 내용 가져오기
      if (isTxt) {
        shareBtn.textContent = '⏳ 불러오는 중...';
        try {
          const res = await fetch(`${WORKER_URL}/download?key=${encodeURIComponent(key)}`, {
            headers: { 'X-Secret-Key': getSecret() }
          });
          const text = await res.text();
          if (navigator.share) {
            navigator.share({ title: name, text }).catch(() => {});
          } else {
            navigator.clipboard.writeText(text).then(() => {
              shareBtn.textContent = '✅ 복사됨!';
              setTimeout(() => { shareBtn.textContent = '📤 공유·복사'; }, 2000);
              return;
            });
          }
        } catch(e) {
          alert('불러오기 실패: ' + e.message);
        }
        shareBtn.textContent = '📤 공유·복사';
        return;
      }

      // 일반 파일은 링크 공유
      if (navigator.share) {
        navigator.share({ title: name, text: `📁 ${name}`, url }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => {
          shareBtn.textContent = '✅ 복사됨!';
          setTimeout(() => { shareBtn.textContent = '📤 공유·복사'; }, 2000);
        });
      }
    });
    btnGroup.appendChild(shareBtn);

    row.appendChild(linkEl);
    row.appendChild(btnGroup);
    card.appendChild(nameRow);
    card.appendChild(row);
    return card;
  }

  // ── 업로드 탭
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileListEl = document.getElementById('fileList');
  const uploadBtn = document.getElementById('uploadBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const progressPct = document.getElementById('progressPct');
  const resultBox = document.getElementById('resultBox');
  const errorBox = document.getElementById('errorBox');

  let selectedFiles = [];

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); addFiles([...e.dataTransfer.files]); });
  fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

  // ── 클립보드 붙여넣기 (Ctrl+V)
  document.addEventListener('paste', e => {
    const files = [...(e.clipboardData?.files || [])];
    if (files.length > 0) addFiles(files);
  });

  function addFiles(files) {
    files.forEach(f => { if (!selectedFiles.find(x => x.name === f.name && x.size === f.size)) selectedFiles.push(f); });
    renderFileList();
  }

  function renderFileList() {
    fileListEl.innerHTML = '';
    selectedFiles.forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = `<span>📄</span><span class="file-name">${f.name}</span><span class="file-size">${formatSize(f.size)}</span><button class="remove-btn" data-i="${i}">✕</button>`;
      fileListEl.appendChild(item);
    });
    fileListEl.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => { selectedFiles.splice(Number(btn.dataset.i), 1); renderFileList(); });
    });
    uploadBtn.disabled = selectedFiles.length === 0;
  }

  function showError(msg) { errorBox.textContent = '⚠️ ' + msg; errorBox.classList.add('show'); }
  function hideError() { errorBox.classList.remove('show'); }
  function setProgress(pct) { progressFill.style.width = pct + '%'; progressPct.textContent = pct + '%'; }

  uploadBtn.addEventListener('click', async () => {
    const secret = getSecret();
    if (!secret) { showError('비밀키를 입력해주세요.'); return; }
    if (!selectedFiles.length) { showError('파일을 선택해주세요.'); return; }

    hideError();
    resultBox.innerHTML = '';
    resultBox.classList.remove('show');
    progressWrap.classList.add('show');
    uploadBtn.disabled = true;

    const results = [];

    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      progressText.textContent = `(${i + 1}/${selectedFiles.length}) ${file.name} 업로드 중...`;
      setProgress(0);
      try {
        const formData = new FormData();
        formData.append('file', file);

        await uploadWithProgress(file, formData, secret, pct => setProgress(pct));
        const downloadUrl = lastDownloadUrl;
        results.push({ name: file.name, url: downloadUrl, size: file.size, key: `uploads/${new Date().toISOString().slice(0,10)}/${encodeURIComponent(file.name)}` });
        setProgress(100);
      } catch (e) {
        showError(`${file.name}: ${e.message}`);
        progressWrap.classList.remove('show');
        uploadBtn.disabled = false;
        return;
      }
    }

    progressText.textContent = '✅ 모든 파일 업로드 완료!';
    setProgress(100);
    results.forEach(r => resultBox.appendChild(makeFcard(r)));
    resultBox.classList.add('show');
    selectedFiles = [];
    renderFileList();
    setTimeout(() => progressWrap.classList.remove('show'), 1500);
  });

  let lastDownloadUrl = '';

  function uploadWithProgress(file, formData, secret, onProgress) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `${WORKER_URL}/upload-file`);
      xhr.setRequestHeader('X-Secret-Key', secret);
      xhr.upload.addEventListener('progress', e => { if (e.lengthComputable) onProgress(Math.round(e.loaded / e.total * 100)); });
      xhr.addEventListener('load', () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          const res = JSON.parse(xhr.responseText);
          lastDownloadUrl = res.downloadUrl;
          resolve();
        } else {
          const err = JSON.parse(xhr.responseText || '{}');
          reject(new Error(err.error || 'HTTP ' + xhr.status));
        }
      });
      xhr.addEventListener('error', () => reject(new Error('네트워크 오류')));
      xhr.send(formData);
    });
  }

  // ── 파일 목록 탭
  const listContent = document.getElementById('listContent');
  const listCount = document.getElementById('listCount');
  const listErrorBox = document.getElementById('listErrorBox');

  document.getElementById('refreshBtn').addEventListener('click', loadList);

  async function loadList() {
    const secret = getSecret();
    if (!secret) {
      listContent.innerHTML = '<div class="list-empty">비밀키를 입력하고 새로고침을 눌러주세요 🔑</div>';
      return;
    }
    listErrorBox.classList.remove('show');
    listContent.innerHTML = '<div class="list-loading">⏳ 불러오는 중...</div>';
    listCount.textContent = '불러오는 중...';

    try {
      const res = await fetch(`${WORKER_URL}/upload-list`, { headers: { 'X-Secret-Key': secret } });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: '오류가 발생했습니다.' }));
        throw new Error(err.error || '목록 불러오기 실패');
      }
      const { files } = await res.json();

      if (!files || files.length === 0) {
        listContent.innerHTML = '<div class="list-empty">업로드된 파일이 없습니다 📭</div>';
        listCount.textContent = '파일 없음';
        return;
      }

      listCount.textContent = `총 ${files.length}개 파일`;

      const grouped = {};
      files.forEach(f => {
        const parts = f.key.split('/');
        // uploads/main|temp/날짜/파일명 또는 uploads/날짜/파일명
        const date = parts.length >= 4 ? parts[2] : parts[1] || '날짜 없음';
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(f);
      });

      const container = document.createElement('div');
      container.className = 'list-items';
      Object.keys(grouped).sort((a, b) => b.localeCompare(a)).forEach(date => {
        const divider = document.createElement('div');
        divider.className = 'date-divider';
        divider.textContent = date;
        container.appendChild(divider);
        grouped[date].forEach(f => {
          const filename = decodeURIComponent(f.key.split('/').pop());
          const card = makeFcard({ name: filename, url: f.url, size: f.size, key: f.key });

          // 삭제 버튼 추가 (목록 탭에서만)
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn';
          deleteBtn.textContent = '🗑 삭제';
          deleteBtn.addEventListener('click', async () => {
            if (!confirm(`"${filename}" 파일을 삭제할까요?`)) return;
            deleteBtn.textContent = '삭제 중...';
            deleteBtn.disabled = true;
            try {
              const res = await fetch(`${WORKER_URL}/upload-delete`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', 'X-Secret-Key': getSecret() },
                body: JSON.stringify({ key: f.key }),
              });
              if (!res.ok) throw new Error('삭제 실패');
              card.remove();
            } catch (e) {
              alert('삭제 실패: ' + e.message);
              deleteBtn.textContent = '🗑 삭제';
              deleteBtn.disabled = false;
            }
          });
          card.querySelector('.fcard-name').appendChild(deleteBtn);
          container.appendChild(card);
        });
      });

      listContent.innerHTML = '';
      listContent.appendChild(container);
    } catch (e) {
      listErrorBox.textContent = '⚠️ ' + e.message;
      listErrorBox.classList.add('show');
      listContent.innerHTML = '';
    }
  }

  // 페이지 로드 시 공유 파일 확인
  loadSharedFiles();
</script>

</body>
</html>
